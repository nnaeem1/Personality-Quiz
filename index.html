<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>What Season Fits Your Personality </title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>
<body>
    <h1 class="text-center mt-4">What Season Are You</h1>
    <p class="text-center text-muted mb-4">Answer 5 questions to find out which season matches your personality!</p>
    
    <!-- Question 1 -->
    <div class="container d-flex justify-content-center" id="question-1">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">1. What's your ideal weekend?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "1" data-answer="spring">Exploring a farmers market ☀️🌼</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "1" data-answer="summer">Beach day with friends 🧑‍🤝‍👩🏖️</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "1" data-answer="autumn">Cozy coffee shop + a book ☕📖</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "1" data-answer="winter">Movie marathon at home 🎬🍿</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Question 2 -->
    <div class="container d-flex justify-content-center" id="question-2">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">2. What's your go-to comfort food?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "2" data-answer="spring">A fresh fruit salad 🍓</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "2" data-answer="summer">Ice cream or smoothies 🍦</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "2" data-answer="autumn">Soup and warm bread 🍞</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "2" data-answer="winter">Hot chocolate and cookies 🍪</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Question 3 -->
    <div class="container d-flex justify-content-center" id="question-3">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">3. How do you handle stress?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "3" data-answer="spring">Go for a walk outside 🚶</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "3" data-answer="summer">Call up a friend 📱</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "3" data-answer="autumn">Journal or reflect quietly 📝</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "3" data-answer="winter">Hibernate and recharge alone 🛌</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Question 4 -->
    <div class="container d-flex justify-content-center" id="question-4">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">4.What's your ideal outfit?</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "4" data-answer="spring">Light floral dress or linen shirt 🌸</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "4" data-answer="summer">Shorts, sunglasses, and sandals 😎</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "4" data-answer="autumn">Oversized sweater and boots 🧣</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "4" data-answer="winter">Full cozy layers and a scarf ❄️</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Question 5 -->
    <div class="container d-flex justify-content-center" id="question-5">
      <div class="card my-4 p-4 question-block" style="width: 75%;">
        <h4 class="mb-3">5. Choose a vibe:</h4>
        <div class="row g-2">
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "5" data-answer="spring">Fresh start, full of hope 🌱</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "5" data-answer="summer">Loud, fun, no plans 🎉</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "5" data-answer="autumn">Warm, nostalgic, a little moody 🍂</button>
          </div>
          <div class="col-6">
            <button class="btn btn-outline-primary w-100 answer-btn" data-question= "5" data-answer="winter">Calm, quiet, introspective 🌙</button>
          </div>
        </div>
      </div>
    </div>

    
    
    <!-- End quiz element -->

    <!-- Add more quiz elements here -->

    <div class="container d-flex justify-content-center">
      <button id="show-result" class="btn btn-success my-4">Show Results</button>
    </div>    
    <!-- Output the result here -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Season Is:</h3>
        <p id="result-text"></p>
      </div>
    </div>
    
    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
